name: period_tracker
description: "Seluna — your cycle companion."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.4.9
  # Firebase & Auth
  firebase_core: ^3.8.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0
  google_sign_in: ^6.2.2
  # Local storage (kept for offline cache)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  table_calendar: ^3.0.9
  intl: ^0.19.0
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4
  design_system:
    path: ../mobile-platform/packages/flutter/design_system
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFF8F0"
  color_dark: "#1A0A06"
  image: assets/icon/icon.png
  android: true
  ios: false

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/
